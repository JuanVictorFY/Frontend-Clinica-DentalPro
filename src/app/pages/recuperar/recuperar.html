<!-- Sección de Recuperar Contraseña -->
<section class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center bg-gray-900 bg-cover bg-center bg-no-repeat py-12" style="background-image: url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');">
  <div class="absolute inset-0 bg-gray-900/60 bg-linear-to-b from-gray-800/40 to-blue-900/80 mix-blend-multiply"></div>

  <div class="relative z-10 w-full max-w-md px-4">
    <!-- Tarjeta de Cristal -->
    <div class="bg-white/90 backdrop-blur-xl rounded-[2.5rem] shadow-2xl shadow-black/50 border border-white/50 overflow-hidden">
      <div class="p-8 sm:p-10">

        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-linear-to-tr from-blue-100 to-blue-50 text-blue-600 mb-6 text-3xl shadow-inner border border-blue-200/50">
            🔐
          </div>
          <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Recuperar Clave</h2>
          <p class="mt-2 text-gray-500 text-sm font-medium">Te enviaremos un enlace para restablecerla</p>
        </div>

        <!-- Control de Flujo: Mostrar Formulario o Mensaje de Éxito -->
        @if(isSent) {
          <div class="text-center space-y-6 animate-fade-in">
            <div class="bg-green-50 border border-green-200 text-green-700 p-5 rounded-2xl text-sm font-medium shadow-sm">
              ¡Enlace enviado! Revisa tu bandeja de entrada o la carpeta de spam en <br><strong class="block mt-2 text-green-800">{{ email }}</strong>
            </div>
            <a routerLink="/login" class="inline-block w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-gray-800 hover:-translate-y-1 hover:shadow-xl transition-all duration-300">
              Volver al inicio de sesión
            </a>
          </div>
        } @else {
          <form class="space-y-5" (ngSubmit)="onSubmit()">
            <div>
              <label for="email" class="block text-sm font-bold text-gray-700 mb-1.5">Correo Electrónico</label>
              <input type="email" id="email" name="email" [(ngModel)]="email" required class="w-full px-5 py-3.5 rounded-2xl border-2 border-gray-100 bg-white/50 focus:bg-white focus:border-blue-500 outline-none transition-all duration-300" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="pt-4">
              <button type="submit" [disabled]="isLoading || !email" class="w-full flex justify-center items-center gap-2 bg-linear-to-r from-blue-600 to-blue-500 text-white font-bold py-4 rounded-2xl hover:from-blue-500 hover:to-blue-400 hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-500/30 active:scale-95 transition-all duration-300 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none">
                @if(isLoading) {
                  <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                  Enviando enlace...
                } @else {
                  Enviar enlace de recuperación
                }
              </button>
            </div>
            <div class="text-center pt-3">
              <a routerLink="/login" class="text-sm font-bold text-gray-500 hover:text-blue-600 transition-colors">&larr; Volver a iniciar sesión</a>
            </div>
          </form>
        }
      </div>
    </div>
  </div>
</section>
